<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'Inter', sans-serif;
      position: relative;
    }

    /* Ambient glow */
    .glow-1 {
      position: absolute;
      top: -100px;
      right: -50px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: rgba(242, 201, 76, 0.1);
      filter: blur(100px);
    }
    .glow-2 {
      position: absolute;
      bottom: -80px;
      left: 100px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(242, 153, 74, 0.06);
      filter: blur(120px);
    }

    /* Grid background */
    .grid-bg {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image:
        linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
      background-size: 80px 80px;
    }

    .content {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      height: 100%;
      padding: 0 80px;
    }

    .text-side {
      flex: 1;
      padding-right: 40px;
    }

    .greeting {
      color: #888;
      font-size: 16px;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .name {
      font-family: 'Cinzel', serif;
      font-size: 64px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 20px;
    }
    .name .first { color: #F2C94C; }
    .name .last { color: #FFFFFF; }

    .role {
      font-family: 'Cinzel', serif;
      font-size: 24px;
      font-weight: 600;
      background: linear-gradient(135deg, #F2994A, #F2C94C);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }

    .tagline {
      color: #999;
      font-size: 16px;
      line-height: 1.6;
      max-width: 440px;
    }
    .tagline strong {
      color: #F2C94C;
      font-weight: 500;
    }

    /* Logo mark */
    .logo-mark {
      position: absolute;
      top: 40px;
      left: 80px;
      z-index: 20;
    }

    /* Photo side */
    .photo-side {
      position: relative;
      width: 340px;
      flex-shrink: 0;
      height: 100%;
      display: flex;
      align-items: flex-end;
    }
    .photo-side img {
      width: 100%;
      height: auto;
      max-height: 580px;
      object-fit: contain;
      object-position: bottom;
      filter: drop-shadow(0 0 50px rgba(242, 201, 76, 0.15));
    }
    .photo-gradient {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(to top, #0a0a0a, transparent);
      z-index: 5;
    }

    /* Tags below photo */
    .tags {
      position: absolute;
      bottom: 30px;
      left: 0;
      right: 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      z-index: 10;
      padding: 0 10px;
    }
    .tag {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 500;
      backdrop-filter: blur(8px);
    }
    .tag-gold {
      background: rgba(242, 201, 76, 0.1);
      color: rgba(242, 201, 76, 0.8);
      border: 1px solid rgba(242, 201, 76, 0.2);
    }
    .tag-white {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* URL badge */
    .url-badge {
      position: absolute;
      bottom: 30px;
      left: 80px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .url-text {
      color: #666;
      font-size: 13px;
      letter-spacing: 1px;
    }
    .social-icons {
      display: flex;
      gap: 8px;
    }
    .social-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .social-dot svg {
      width: 13px;
      height: 13px;
      fill: none;
      stroke: #888;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="grid-bg"></div>

  <!-- Logo mark -->
  <div class="logo-mark">
    <svg width="44" height="44" viewBox="0 0 48 48" fill="none">
      <rect x="2" y="2" width="44" height="44" rx="12" fill="rgba(17,17,17,0.9)" stroke="url(#ring)" stroke-width="1.5"/>
      <path d="M18 8 L30 20 L18 20 L30 40" stroke="url(#rg)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <defs>
        <linearGradient id="ring" x1="0" y1="0" x2="48" y2="48">
          <stop stop-color="#F2C94C" stop-opacity="0.5"/>
          <stop offset="1" stop-color="#F2994A" stop-opacity="0.3"/>
        </linearGradient>
        <linearGradient id="rg" x1="18" y1="8" x2="30" y2="40">
          <stop stop-color="#F2C94C"/>
          <stop offset="0.5" stop-color="#F2994A"/>
          <stop offset="1" stop-color="#F2C94C"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <div class="content">
    <div class="text-side">
      <p class="greeting">Xin Chao!</p>
      <h1 class="name">
        <span class="first">Son</span><br>
        <span class="last">Nguyen</span>
      </h1>
      <p class="role">Growth Marketing Manager</p>
      <p class="tagline">
        I create content that doesn't just convert, it connects.
        Where <strong>growth marketing meets sustainable impact</strong>.
      </p>
    </div>

    <div class="photo-side">
      <img src="/images/son-hero-right.png" alt="Son Nguyen">
      <div class="photo-gradient"></div>
      <div class="tags">
        <span class="tag tag-white">Food Blogger</span>
        <span class="tag tag-gold">Sweden</span>
        <span class="tag tag-white">iPhonegrapher</span>
        <span class="tag tag-gold">Creative</span>
      </div>
    </div>
  </div>

  <!-- Bottom URL -->
  <div class="url-badge">
    <span class="url-text">sonnguyen.dev</span>
    <div class="social-icons">
      <div class="social-dot">
        <svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
      </div>
      <div class="social-dot">
        <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
      </div>
    </div>
  </div>
</body>
</html>
